# Retirado em favor do deploy direto no Railway (orbit-web,
# orbit-web-production-0a39.up.railway.app). Mantido como acionamento manual
# só para o caso de precisarmos voltar a publicar na Hostinger no futuro.
name: Deploy frontend to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build static export
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install paramiko
        run: pip install --quiet paramiko

      - name: Deploy via SFTP
        env:
          PYTHONUNBUFFERED: "1"
          HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          HOSTINGER_SFTP_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          HOSTINGER_SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          HOSTINGER_SFTP_PASSWORD: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: python scripts/deploy_hostinger.py
