name: Deploy frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build static export
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          SFTP_USER: ${{ secrets.HOSTINGER_SFTP_USER }}
          SFTP_PASS: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          lftp -c "
          set sftp:auto-confirm yes;
          open -u \"\$SFTP_USER\",\"\$SFTP_PASS\" -p \"\$SFTP_PORT\" sftp://\$SFTP_HOST;
          mirror -R --delete --verbose ./apps/web/out \"\$REMOTE_PATH\"
          "
